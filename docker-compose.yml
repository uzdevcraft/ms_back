# LOCAL DEVELOPMENT ONLY — PostgreSQL in Docker.
# Production: DigitalOcean Managed PostgreSQL + PM2 on Droplet (no Postgres container on server).

services:
  postgres:
    image: postgres:16-alpine
    container_name: tg_marketplace_db_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-telegram_marketplace}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-telegram_marketplace}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data_dev:
